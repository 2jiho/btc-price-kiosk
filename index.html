<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <link
      rel="icon"
      href="./bitcoin-btc-logo.svg"
      type="image/svg+xml"
    />
    <title>비트코인 실시간 가격</title>
    <style>
      :root {
        --reference-size: calc(min(1vw, 2vh));
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background-color: #000;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }
      #container {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      #icon {
        height: calc(var(--reference-size) * 15);
        margin-right: calc(var(--reference-size) * 5);
      }
      #price-krw {
        margin: 0;
        font-size: calc(var(--reference-size) * 5);
        margin-right: calc(var(--reference-size) * 5);
      }
      #price-usd {
        margin: 0;
        font-size: calc(var(--reference-size) * 3);
        margin-right: calc(var(--reference-size) * 5);
      }
      #change {
        margin: 0;
        font-size: calc(var(--reference-size) * 3);
      }
      #change-label {
        margin: 0;
        font-size: calc(var(--reference-size) * 2);
        color: gray;
      }
      #status-indicator {
        position: fixed;
        top: 8px;
        right: 12px;
        font-size: 12px;
        color: #666;
        opacity: 0.6;
        transition: opacity 0.3s;
        cursor: pointer;
        user-select: none;
      }
      #status-indicator.error {
        color: #ff6b6b;
        opacity: 1;
      }
      #status-indicator.connected {
        color: #51cf66;
      }
      .krw-estimated {
        font-size: 0.7em;
        vertical-align: super;
        color: #888;
        margin-left: 4px;
      }
      #status-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.7);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
        transition: opacity 0.5s ease;
      }
      #status-overlay h1 {
        color: #ff6b6b;
        font-size: calc(var(--reference-size) * 8);
        margin-bottom: 20px;
      }
      #status-overlay p {
        color: #fff;
        font-size: calc(var(--reference-size) * 4);
      }
      #admin-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(20, 20, 20, 0.95);
        border: 1px solid #444;
        border-radius: 12px;
        padding: 30px;
        display: none;
        flex-direction: column;
        gap: 15px;
        z-index: 2000;
        min-width: 400px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
      }
      #admin-panel h2 {
        margin: 0 0 10px 0;
        color: #fff;
        font-size: 18px;
        text-align: center;
      }
      #admin-panel label {
        color: #ccc;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #admin-panel input, #admin-panel select {
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 5px 10px;
        font-size: 14px;
        width: 150px;
      }
      #admin-panel button {
        background: #51cf66;
        color: #000;
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
      #admin-panel button:hover {
        background: #40b050;
      }
      #icon-fallback {
        display: none;
        height: calc(var(--reference-size) * 15);
        width: calc(var(--reference-size) * 15);
        justify-content: center;
        align-items: center;
        font-size: calc(var(--reference-size) * 4);
        font-weight: bold;
        color: #fff;
        background: #333;
        border-radius: 50%;
        margin-right: calc(var(--reference-size) * 5);
      }
    </style>
  </head>
  <body>
    <div id="admin-panel">
      <h2>관리자 설정</h2>
      <label>
        코인 티커
        <input type="text" id="admin-symbol" value="BTC" placeholder="BTC" />
      </label>
      <label>
        업데이트 주기 (ms)
        <input type="number" id="admin-interval" value="2000" min="1000" max="10000" step="500" />
      </label>
      <label>
        디버그 모드
        <input type="checkbox" id="admin-debug" />
      </label>
      <button id="admin-save">저장 및 적용</button>
      <button id="admin-close" style="background:#666; color:#fff;">닫기</button>
    </div>
    <div id="status-indicator" aria-live="polite"></div>
    <div id="status-overlay">
      <h1>연결 끊김</h1>
      <p id="overlay-msg">네트워크 상태를 확인 중입니다...</p>
    </div>
    <div id="container">
      <img src="./bitcoin-btc-logo.svg" id="icon" alt="Bitcoin logo" />
      <div id="icon-fallback"></div>
      <div>
        <p id="price-krw" aria-live="polite" aria-atomic="true"></p>
        <p id="price-usd" aria-live="polite" aria-atomic="true"></p>
      </div>
      <div>
        <p id="change" aria-live="polite" aria-atomic="true"></p>
        <p id="change-label">24h</p>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        // ========== 설정 상수 ==========
        const CONFIG = {
          DEBUG_MODE: false,
          EXCHANGE_RATE_UPDATE_INTERVAL: 6 * 60 * 1000,
          PRICE_UPDATE_INTERVAL: 2000,
          BURNIN_PREVENTION_INTERVAL: 60 * 1000,
          BURNIN_PREVENTION_STEP: 10,
          BURNIN_PREVENTION_LIMIT: 0.1,
          PRICE_ANIMATION_DURATION: 500,
          WEBSOCKET_RECONNECT_BASE_DELAY: 1000,
          WEBSOCKET_RECONNECT_MAX_DELAY: 30000,
          WEBSOCKET_RETRY_DELAY: 1000,
          DEFAULT_KRW_USD_RATE: 1400,
          BTC_SYMBOL: "BTCUSDT",
        };

        // 디버그 로깅 헬퍼
        const log = {
          debug: function () {
            if (CONFIG.DEBUG_MODE) console.debug.apply(console, arguments);
          },
          info: function () {
            console.log.apply(console, arguments);
          },
          warn: function () {
            console.warn.apply(console, arguments);
          },
          error: function () {
            console.error.apply(console, arguments);
          },
        };

        // UUID 생성 (crypto.randomUUID 미지원 브라우저 대응)
        function generateId() {
          if (crypto.randomUUID) {
            return crypto.randomUUID();
          }
          return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(
            /[xy]/g,
            function (c) {
              var r = (Math.random() * 16) | 0;
              return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
            }
          );
        }

        // ========== DOM 요소 캐싱 ==========
        var elPriceKRW = document.getElementById("price-krw");
        var elPriceUSD = document.getElementById("price-usd");
        var elChange = document.getElementById("change");
        var elContainer = document.getElementById("container");
        var elStatus = document.getElementById("status-indicator");
        var elOverlay = document.getElementById("status-overlay");
        var elOverlayMsg = document.getElementById("overlay-msg");
        var elAdminPanel = document.getElementById("admin-panel");
        var elAdminSymbol = document.getElementById("admin-symbol");
        var elAdminInterval = document.getElementById("admin-interval");
        var elAdminDebug = document.getElementById("admin-debug");
        var elAdminSave = document.getElementById("admin-save");
        var elAdminClose = document.getElementById("admin-close");
        var elIcon = document.getElementById("icon");
        var elIconFallback = document.getElementById("icon-fallback");


        // ========== 상태 표시 ==========
        function setStatus(text, className) {
          elStatus.textContent = text;
          elStatus.className = className || "";

          if (className === "connected") {
            elOverlay.style.display = "none";
          } else if (className === "error") {
            elOverlay.style.display = "flex";
            elOverlayMsg.textContent = text;
          }
        }

        // ========== 리소스 정리용 ID 저장 ==========
        var intervalIds = [];
        var timeoutIds = [];

        function addInterval(id) {
          intervalIds.push(id);
          return id;
        }

        function addTimeout(id) {
          timeoutIds.push(id);
          return id;
        }

        // ========== 환율 (다중 소스 fallback) ==========
        var krwUsdRate = CONFIG.DEFAULT_KRW_USD_RATE;
        var exchangeRateSource = "기본값";

        async function fetchExchangeRate() {
          const sources = [
            {
              name: "Frankfurter",
              fetch: async () => {
                const res = await fetch("https://api.frankfurter.dev/v2/rate/USD/KRW");
                if (!res.ok) throw new Error("Frankfurter v2 API error: " + res.status);
                const data = await res.json();
                if (!data.rate) throw new Error("Invalid Frankfurter v2 data");
                return data.rate;
              }
            },
            {
              name: "manana.kr",
              fetch: async () => {
                const res = await fetch("https://api.manana.kr/exchange/rate/KRW/USD.json");
                if (!res.ok) throw new Error("manana.kr API error: " + res.status);
                const data = await res.json();
                if (!data || !data[0] || !data[0].rate) throw new Error("Invalid manana.kr data");
                return data[0].rate;
              }
            }
          ];

          for (const source of sources) {
            try {
              const rate = await source.fetch();
              if (rate && !isNaN(rate)) {
                krwUsdRate = rate;
                exchangeRateSource = source.name;
                log.info("환율 업데이트 완료 (" + source.name + "): " + krwUsdRate.toFixed(2) + " KRW/USD");
                return;
              }
            } catch (e) {
              log.warn(source.name + " 소스 실패: " + e.message);
            }
          }

          log.error("모든 환율 소스 실패, 기본값 사용");
          exchangeRateSource = "기본값";
          krwUsdRate = CONFIG.DEFAULT_KRW_USD_RATE;
        }

        fetchExchangeRate();
        addInterval(
          setInterval(fetchExchangeRate, CONFIG.EXCHANGE_RATE_UPDATE_INTERVAL)
        );

        // ========== BTC 가격 ==========
        var ws = null;
        var lastPrice = 0;
        var reconnectTimeout = null;
        var reconnectAttempts = 0;
        var priceUpdateIntervalId = null;
        var isThrottled = false;

        function getReconnectDelay() {
          var delay = Math.min(
            CONFIG.WEBSOCKET_RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts),
            CONFIG.WEBSOCKET_RECONNECT_MAX_DELAY
          );
          return delay;
        }

        function connectWebSocket() {
          if (ws) {
            ws.onclose = null; // 재연결 루프 방지
            ws.close();
          }

          setStatus("연결 중...", "");

          ws = new WebSocket("wss://ws-api.binance.com/ws-api/v3");

          ws.onopen = function () {
            log.info("WebSocket 연결 성공");
            reconnectAttempts = 0;
            setStatus("연결됨", "connected");
            ws.send(
              JSON.stringify({
                id: generateId(),
                method: "ping",
              })
            );
          };

          ws.onmessage = function (event) {
            var response;
            try {
              response = JSON.parse(event.data);
            } catch (e) {
              log.error("WebSocket 메시지 파싱 실패:", e);
              return;
            }
            log.debug("Received data:", response);

            if (response.error) {
              log.error("WebSocket 에러:", response.error);
              return;
            }

            if (!response.result) {
              log.warn("response.result가 없습니다:", response);
              return;
            }

            if (Object.keys(response.result).length === 0) {
              log.info("WebSocket 연결됨 (ping/pong)");
              sendTickerRequest();
            } else if (response.result.symbol === CONFIG.BTC_SYMBOL) {
              updatePrice(response.result);
            }

            // Rate limit 체크 및 스로틀링
            if (response.rateLimits && response.rateLimits[0]) {
              var rateLimit = response.rateLimits[0];
              var usage = rateLimit.count / rateLimit.limit;
              log.debug(
                "Rate limit: " + rateLimit.count + "/" + rateLimit.limit + " requests/min"
              );

              if (usage > 0.8 && !isThrottled) {
                isThrottled = true;
                log.warn("Rate limit 80% 도달. 요청 빈도를 줄입니다.");
                // 기존 인터벌을 제거하고 2배 느린 주기로 교체
                if (priceUpdateIntervalId) {
                  clearInterval(priceUpdateIntervalId);
                }
                priceUpdateIntervalId = addInterval(
                  setInterval(sendTickerRequest, CONFIG.PRICE_UPDATE_INTERVAL * 2)
                );
              } else if (usage < 0.5 && isThrottled) {
                isThrottled = false;
                log.info("Rate limit 여유 확보. 정상 빈도로 복구합니다.");
                if (priceUpdateIntervalId) {
                  clearInterval(priceUpdateIntervalId);
                }
                priceUpdateIntervalId = addInterval(
                  setInterval(sendTickerRequest, CONFIG.PRICE_UPDATE_INTERVAL)
                );
              }
            }
          };

          ws.onclose = function (event) {
            log.warn("WebSocket 연결 종료:", event.code, event.reason);
            var delay = getReconnectDelay();
            reconnectAttempts++;
            setStatus("재연결 대기 (" + Math.round(delay / 1000) + "초)", "error");

            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            reconnectTimeout = addTimeout(
              setTimeout(function () {
                log.info("WebSocket 재연결 시도 중... (시도 " + reconnectAttempts + ")");
                connectWebSocket();
              }, delay)
            );
          };

          ws.onerror = function (error) {
            log.error("WebSocket 에러:", error);
            setStatus("연결 오류", "error");
          };
        }

        function sendTickerRequest() {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                id: generateId(),
                method: "ticker.24hr",
                params: {
                  symbol: CONFIG.BTC_SYMBOL,
                },
              })
            );
          } else {
            log.debug("WebSocket이 아직 연결되지 않았습니다. 재시도 중...");
            addTimeout(
              setTimeout(sendTickerRequest, CONFIG.WEBSOCKET_RETRY_DELAY)
            );
          }
        }

        function updatePrice(data) {
          if (!data || !data.lastPrice) {
            log.error("잘못된 데이터:", data);
            return;
          }

          var priceUSD = parseFloat(data.lastPrice);
          var priceKRW = priceUSD * krwUsdRate;
          var percentChange = parseFloat(data.priceChangePercent);

          if (isNaN(priceUSD) || isNaN(percentChange)) {
            log.error("가격 파싱 실패:", data);
            return;
          }

          log.debug({
            priceUSD: priceUSD,
            priceKRW: priceKRW,
            percentChange: percentChange,
            exchangeRateSource: exchangeRateSource,
          });

          // USD 가격 표시
          var formattedPriceUSD = priceUSD.toLocaleString(undefined, {
            style: "currency",
            currency: "USD",
            currencyDisplay: "narrowSymbol",
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });
          elPriceUSD.textContent = formattedPriceUSD;

          // KRW 가격 표시 (추정일 경우 별도 스타일)
          var formattedPriceKRW = priceKRW.toLocaleString(undefined, {
            style: "currency",
            currency: "KRW",
            currencyDisplay: "narrowSymbol",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          });

          if (exchangeRateSource === "기본값") {
            elPriceKRW.innerHTML = formattedPriceKRW + '<span class="krw-estimated">(추정)</span>';
          } else {
            elPriceKRW.textContent = formattedPriceKRW;
          }

          // 24시간 변화율 표시
          var formattedChange =
            (percentChange >= 0 ? "+" : "") + percentChange.toFixed(2) + "%";
          elChange.textContent = formattedChange;
          if (percentChange > 0) {
            elChange.style.color = "lightgreen";
          } else if (percentChange < 0) {
            elChange.style.color = "lightcoral";
          } else {
            elChange.style.color = "white";
          }

          // 가격 변화에 따른 애니메이션 효과
          if (priceUSD > lastPrice) {
            elPriceUSD.style.color = "green";
          } else if (priceUSD < lastPrice) {
            elPriceUSD.style.color = "maroon";
          }
          addTimeout(
            setTimeout(function () {
              elPriceUSD.style.color = "gray";
            }, CONFIG.PRICE_ANIMATION_DURATION)
          );

          lastPrice = priceUSD;
        }

        // WebSocket 연결 및 주기적 가격 업데이트
        connectWebSocket();
        priceUpdateIntervalId = addInterval(
          setInterval(sendTickerRequest, CONFIG.PRICE_UPDATE_INTERVAL)
        );

        // ========== 화면 번인 방지 ==========
        var offsetX = 0;
        var offsetY = 0;

        function moveContainer() {
          var limitX =
            ((window.innerWidth - elContainer.offsetWidth) / 2) *
            CONFIG.BURNIN_PREVENTION_LIMIT;
          var limitY =
            ((window.innerHeight - elContainer.offsetHeight) / 2) *
            CONFIG.BURNIN_PREVENTION_LIMIT;
          limitX = Math.floor(limitX);
          limitY = Math.floor(limitY);

          offsetX +=
            (Math.random() < 0.5 ? 1 : -1) * CONFIG.BURNIN_PREVENTION_STEP;
          offsetY +=
            (Math.random() < 0.5 ? 1 : -1) * CONFIG.BURNIN_PREVENTION_STEP;

          offsetX = Math.max(Math.min(offsetX, limitX), -limitX);
          offsetY = Math.max(Math.min(offsetY, limitY), -limitY);

          elContainer.style.transform =
            "translate(" + offsetX + "px, " + offsetY + "px)";
          log.debug("translate(" + offsetX + "px, " + offsetY + "px)");
        }

        addInterval(
          setInterval(moveContainer, CONFIG.BURNIN_PREVENTION_INTERVAL)
        );

        // ========== Wake Lock (화면 꺼짐 방지) ==========
        var wakeLock = null;

        async function enableWakeLock() {
          if (!("wakeLock" in navigator)) {
            log.warn("이 브라우저는 Wake Lock API를 지원하지 않습니다.");
            return;
          }
          if (document.visibilityState !== "visible") {
            log.warn("페이지가 보이지 않습니다. Wake Lock을 요청할 수 없습니다.");
            return;
          }

          try {
            wakeLock = await navigator.wakeLock.request("screen");
            log.info("Wake Lock 활성화: 화면이 꺼지지 않습니다.");
          } catch (err) {
            log.error("Wake Lock 에러: " + err.name + " - " + err.message);
          }
        }

        async function releaseWakeLock() {
          if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
            log.info("Wake Lock 해제됨");
          }
        }

        document.addEventListener("visibilitychange", async function () {
          if (document.visibilityState === "visible") {
            await enableWakeLock();
          } else {
            await releaseWakeLock();
          }
        });

        enableWakeLock();

        // ========== 두 번 클릭 시 밝기 조절 (컨텐츠 영역만) ==========
        var light = true;

        elContainer.addEventListener("dblclick", function () {
          light = !light;
          elContainer.style.setProperty("filter", "brightness(" + (light ? 100 : 50) + "%)", "important");
          log.debug("밝기: " + (light ? "100%" : "50%"));
        });

        // ========== 전체 화면 시 커서 숨김 ==========
        var cursorTimeout = null;

        function checkFullscreenAndHideCursor() {
          if (document.fullscreenElement) {
            document.body.style.cursor = "none";
          } else {
            document.body.style.cursor = "auto";
          }
        }

        document.addEventListener("mousemove", function () {
          document.body.style.cursor = "auto";
          if (cursorTimeout) clearTimeout(cursorTimeout);
          cursorTimeout = setTimeout(checkFullscreenAndHideCursor, 2000);
        });

        document.addEventListener("fullscreenchange", checkFullscreenAndHideCursor);

        // ========== 페이지 언로드 시 리소스 정리 ==========
        window.addEventListener("beforeunload", function () {
          intervalIds.forEach(clearInterval);
          timeoutIds.forEach(clearTimeout);
          if (ws) {
            ws.onclose = null;
            ws.close();
          }
          releaseWakeLock();
        });

        // ========== 관리자 설정 (Admin Panel) ==========
        function getBinanceSymbol(ticker) {
          return ticker.toUpperCase() + "USDT";
        }

        function getIconUrl(ticker) {
          var lower = ticker.toLowerCase();
          return "https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/" + lower + ".svg";
        }

        function updateIcon(ticker) {
          var iconUrl = getIconUrl(ticker);
          
          elIcon.onload = function() {
            elIcon.style.display = "block";
            elIconFallback.style.display = "none";
          };
          
          elIcon.onerror = function() {
            log.warn("아이콘 로드 실패, 티커 텍스트로 대체");
            elIcon.style.display = "none";
            elIconFallback.textContent = ticker.toUpperCase();
            elIconFallback.style.display = "flex";
          };
          
          elIcon.src = iconUrl;
          elIcon.alt = ticker.toUpperCase() + " logo";
        }

        function loadSettings() {
          try {
            var saved = localStorage.getItem("btc-kiosk-settings");
            if (saved) {
              var settings = JSON.parse(saved);
              if (settings.ticker) {
                CONFIG.BTC_SYMBOL = getBinanceSymbol(settings.ticker);
                updateIcon(settings.ticker);
              }
              if (settings.interval) CONFIG.PRICE_UPDATE_INTERVAL = parseInt(settings.interval);
              if (settings.debug !== undefined) CONFIG.DEBUG_MODE = settings.debug;
              log.info("설정 불러오기 완료:", settings);
            }
          } catch (e) {
            log.error("설정 불러오기 실패:", e);
          }
        }

        function saveSettings() {
          var ticker = elAdminSymbol.value.trim().toUpperCase();
          if (!ticker) {
            alert("티커를 입력해주세요.");
            return;
          }

          var binanceSymbol = getBinanceSymbol(ticker);
          CONFIG.BTC_SYMBOL = binanceSymbol;
          CONFIG.PRICE_UPDATE_INTERVAL = parseInt(elAdminInterval.value);
          CONFIG.DEBUG_MODE = elAdminDebug.checked;

          var settings = {
            ticker: ticker,
            interval: CONFIG.PRICE_UPDATE_INTERVAL,
            debug: CONFIG.DEBUG_MODE
          };
          localStorage.setItem("btc-kiosk-settings", JSON.stringify(settings));
          log.info("설정 저장 완료:", settings);

          // 아이콘 업데이트
          updateIcon(ticker);

          // 실시간 적용
          if (priceUpdateIntervalId) {
            clearInterval(priceUpdateIntervalId);
          }
          priceUpdateIntervalId = addInterval(
            setInterval(sendTickerRequest, CONFIG.PRICE_UPDATE_INTERVAL)
          );

          // WebSocket 재연결 (심볼 변경 시)
          connectWebSocket();

          hideAdminPanel();
          alert("설정이 저장되었습니다.");
        }

        function showAdminPanel() {
          var currentTicker = CONFIG.BTC_SYMBOL.replace("USDT", "");
          elAdminSymbol.value = currentTicker;
          elAdminInterval.value = CONFIG.PRICE_UPDATE_INTERVAL;
          elAdminDebug.checked = CONFIG.DEBUG_MODE;
          elAdminPanel.style.display = "flex";
        }

        function hideAdminPanel() {
          elAdminPanel.style.display = "none";
        }

        // 상태 표시줄 클릭으로 관리자 패널 열기
        elStatus.addEventListener("click", showAdminPanel);

        elAdminSave.addEventListener("click", saveSettings);
        elAdminClose.addEventListener("click", hideAdminPanel);

        // 초기 설정 로드
        loadSettings();

        // ========== Service Worker 등록 ==========
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("./service-worker.js").then(
            function (registration) {
              log.info("Service Worker 등록됨: " + registration.scope);
            },
            function (error) {
              log.error("Service Worker 등록 실패:", error);
            }
          );
        }
      })();
    </script>
  </body>
</html>
